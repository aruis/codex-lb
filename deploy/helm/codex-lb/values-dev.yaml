# Development environment — based on the bundled install mode with local-friendly scale and logging.
replicaCount: 1

autoscaling:
  enabled: false

postgresql:
  enabled: true

networkPolicy:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  logFormat: text
